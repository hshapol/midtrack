  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Midterm Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
   :root {
      --bg: #f1f5f9; --surface: #ffffff; --card: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --muted: #64748b; --faint: #94a3b8;
      --dem: #2563eb; --rep: #dc2626; --dem-bg: #dbeafe; --rep-bg: #fee2e2;
      --tossup: #d97706; --tossup-bg: #fef3c7; --green: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }
    .header { background: #0f172a; border-bottom: 1px solid #1e293b; padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: white; }
    .header-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .header-meta { text-align: right; font-size: 12px; color: #94a3b8; }
    .updated { color: var(--green); font-weight: 600; }
    .tabs { display: flex; flex-wrap: wrap; gap: 4px; }
    .tab { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; background: transparent; color: #94a3b8; transition: all 0.15s; text-transform: capitalize; }
    .tab:hover { background: #1e293b; color: white; }
    .tab.active { background: var(--dem); color: white; }
    .main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 768px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .stat-val { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .stat-sub { font-size: 11px; color: var(--faint); margin-top: 4px; }
    .dem-color { color: var(--dem); } .rep-color { color: var(--rep); } .tossup-color { color: var(--tossup); }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .badge-d { background: #1d4ed8; color: white; } .badge-r { background: #b91c1c; color: white; }
    .badge-tossup { background: var(--tossup-bg); color: var(--tossup); border: 1px solid var(--tossup); }
    .badge-lean-d { background: #dbeafe; color: #1d4ed8; }
    .badge-lean-r { background: #fee2e2; color: #b91c1c; }
    .badge-likely-d { background: #bfdbfe; color: #1e40af; }
    .badge-likely-r { background: #fecaca; color: #991b1b; }
    .badge-safe-d { background: #1e40af; color: white; }
    .badge-safe-r { background: #991b1b; color: white; }
    .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 4px; }
    .pill-d { background: #dbeafe; color: #1d4ed8; border: 1px solid #2563eb; }
    .pill-r { background: #fee2e2; color: #b91c1c; border: 1px solid #dc2626; }
    .race-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: border-color 0.15s; }
    .race-card:hover { border-color: var(--dem); }
    .race-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .race-name { font-weight: 700; font-size: 15px; }
    .race-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .race-row-label { font-size: 11px; color: var(--faint); }
    .poll-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .poll-row.avg-row { border-color: #92400e; background: #fffbeb; }
    .poll-row.rtwh-row { border-color: #1d4ed8; background: #eff6ff; }
    .poll-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .poll-margin { font-size: 16px; font-weight: 800; }
    .race-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--surface); border-radius: 12px 12px 0 0; }
    .race-tab { padding: 10px 14px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; color: var(--faint); transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
    .race-tab:hover { color: var(--text); }
    .race-tab.active { border-bottom-color: var(--dem); color: #1d4ed8; background: var(--card); }
    .race-content { padding: 20px; }
    .mkt-bar-wrap { height: 28px; background: var(--border); border-radius: 6px; overflow: hidden; }
    .mkt-bar-fill { height: 100%; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 700; color: white; border-radius: 6px; }
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--dem); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .appr-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .appr-fill { height: 20px; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 700; color: white; }
    .source-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .source-link { color: var(--dem); font-size: 12px; text-decoration: none; }
    .source-link:hover { text-decoration: underline; }
    .space-y > * + * { margin-top: 16px; }
    .stale-badge { color: var(--tossup); font-size: 10px; margin-left: 4px; }
    .ietd-row { display: flex; align-items: baseline; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .ietd-row:last-child { border-bottom: none; padding-bottom: 0; }
    .ietd-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); min-width: 130px; flex-shrink: 0; }
    .ietd-value { font-size: 13px; color: var(--text); line-height: 1.6; }
  </style>
</head>

function fmtMargin(margin) {
  const m = parseFloat(margin);
  const abs = Math.abs(m).toFixed(1);
  if (m > 0) return `+${abs} D`;
  if (m < 0) return `+${abs} R`;
  return 'Even';
}

function isMarginD(margin) { return parseFloat(margin) > 0; }

function ratingBadgeClass(r) {
  if (!r) return '';
  const l = r.toLowerCase();
  if (l.includes('toss')) return 'badge-tossup';
  if (l.includes('lean d')) return 'badge-lean-d';
  if (l.includes('lean r')) return 'badge-lean-r';
  if (l.includes('likely d')) return 'badge-likely-d';
  if (l.includes('likely r')) return 'badge-likely-r';
  if (l.includes('safe d')) return 'badge-safe-d';
  if (l.includes('safe r')) return 'badge-safe-r';
  return '';
}

function getRating(state) {
  if (!DATA || !DATA.senateRatings) return { cook: '', sabato: '', ie: '' };
  const key = Object.keys(DATA.senateRatings).find(k =>
    k.toLowerCase() === state.toLowerCase() ||
    state.toLowerCase().startsWith(k.toLowerCase()) ||
    k.toLowerCase().startsWith(state.toLowerCase().split(' ')[0])
  );
  return key ? DATA.senateRatings[key] : { cook: '', sabato: '', ie: '' };
}

function daysSince(dateStr) {
  if (!dateStr) return 999;
  return (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs || {}).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => c && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

function div(cls, html) {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  if (html !== undefined) d.innerHTML = html;
  return d;
}

  TABS.forEach(t => {
    const btn = el('button', { class: 'tab' + (t === currentTab ? ' active' : ''), onclick: () => { currentTab = t; renderTabs(); renderMain(); } }, t);
    container.appendChild(btn);
  });
}

function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!DATA) { main.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>'; return; }
  const poly = DATA.markets?.polymarket || {};
  const kalshi = DATA.markets?.kalshi || {};
  const gb = DATA.genericBallot;
  if (currentTab === 'overview')        main.appendChild(renderOverview(poly, kalshi, gb));
  if (currentTab === 'generic ballot')  main.appendChild(renderGenericBallot(gb));
  if (currentTab === 'senate races')    main.appendChild(renderSenateRaces());
  if (currentTab === 'senate polling')  main.appendChild(renderSenatePolling());
  if (currentTab === 'markets')         main.appendChild(renderMarkets(poly, kalshi));
  if (currentTab === 'trends')          main.appendChild(renderTrends());
  if (currentTab === 'trump approval')  main.appendChild(renderTrumpApproval(DATA.trumpApproval));
  if (currentTab === 'sources')         main.appendChild(renderSources());
}

function renderOverview(poly, kalshi, gb) {
  const wrap = div('space-y');

  // CHANGE 2: IETD card first
  const ietdCard = div('card');
  const BIG8 = ["Maine","North Carolina","Georgia","Michigan","Ohio (Special)","Alaska","Texas","New Hampshire"];
  const pollDFlips = [], pollDHolds = [], pollRHolds = [];
  BIG8.forEach(state => {
    const detail = RACE_DETAILS[state];
    const liveData = DATA?.senatePolls?.[state];
    const bestAvg = liveData?.rtwh || liveData?.avg;
    if (!bestAvg) return;
    const isD = parseFloat(bestAvg.margin) > 0;
    if (isD && detail.hold === 'R') pollDFlips.push(state);
    else if (isD && detail.hold === 'D') pollDHolds.push(state);
    else pollRHolds.push(state);
  });

  const fcDFlips = [], fcDHolds = [], fcTossups = [], fcRHolds = [];
  RACE_ORDER.forEach(state => {
    const detail = RACE_DETAILS[state];
    const r = (getRating(state).cook || '').toLowerCase();
    const leanD = r.includes('lean d') || r.includes('likely d') || r.includes('safe d');
    const leanR = r.includes('lean r') || r.includes('likely r') || r.includes('safe r');
    if (!leanD && !leanR) fcTossups.push(state);
    else if (leanD && detail.hold === 'R') fcDFlips.push(state);
    else if (leanD && detail.hold === 'D') fcDHolds.push(state);
    else fcRHolds.push(state);
  });

  const polyHouse = poly.houseD != null ? `<span style="color:var(--dem);font-weight:600">${poly.houseD}% D</span>` : '—';
  const polySenate = poly.senateR != null ? `<span style="color:var(--dem);font-weight:600">${100-poly.senateR}% D</span>` : '—';
  const kalshiSenate = kalshi.senateR != null ? `<span style="color:var(--dem);font-weight:600">${100-kalshi.senateR}% D</span>` : '<span style="color:var(--faint)">—</span>';

  ietdCard.innerHTML = `
    <div class="card-title">🗳 If the Election Were Held Today</div>
    <div class="ietd-row">
      <span class="ietd-label">Markets</span>
      <span class="ietd-value">House ${polyHouse} · Senate flip ${polySenate} (Polymarket) / ${kalshiSenate} (Kalshi)</span>
    </div>
    <div class="ietd-row">
      <span class="ietd-label">Polls say</span>
      <span class="ietd-value">${pollDFlips.length ? `Dems on track for <span style="color:var(--dem);font-weight:600">${pollDFlips.length} flip${pollDFlips.length>1?'s':''}</span> (${pollDFlips.join(', ')}) · ` : 'No clear D flips · '}${pollDHolds.length ? `Dems hold ${pollDHolds.join(', ')} · ` : ''}${pollRHolds.length ? `Rs hold ${pollRHolds.join(', ')} · ` : ''}Net: Dems <span style="color:var(--dem);font-weight:600">+${pollDFlips.length}</span>${pollDFlips.length < 4 ? ', still short of majority' : ', enough for majority'}</span>
    </div>
    <div class="ietd-row">
      <span class="ietd-label">Forecasters</span>
      <span class="ietd-value">${fcTossups.length ? `<span style="color:var(--tossup);font-weight:600">${fcTossups.length} Toss-Up${fcTossups.length>1?'s':''}</span> (${fcTossups.join(', ')}) · ` : ''}${fcDFlips.length ? `<span style="color:var(--dem);font-weight:600">${fcDFlips.length} Lean D flip${fcDFlips.length>1?'s':''}</span> (${fcDFlips.join(', ')}) · ` : ''}${fcDHolds.length ? `<span style="color:var(--dem);">${fcDHolds.length} Lean D hold${fcDHolds.length>1?'s':''}</span> (${fcDHolds.join(', ')}) · ` : ''}${fcRHolds.length ? `<span style="color:var(--rep);">${fcRHolds.length} Lean/Likely R</span> (${fcRHolds.join(', ')})` : ''}</span>
    </div>`;
  wrap.appendChild(ietdCard);

  // CHANGE 3: Prediction Market Summary, CHANGE 4: only House D and Senate R
  const summaryCard = div('card');
  summaryCard.innerHTML = `
    <div class="card-title">Prediction Market Summary</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:8px 12px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Outcome</th>
          <th style="text-align:center;padding:8px 12px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Polymarket</th>
          <th style="text-align:center;padding:8px 12px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Kalshi</th>
        </tr>
      </thead>
      <tbody>
        ${[
          { label:'House → Dem', pD: poly.houseD, kD: kalshi.houseD, d:true },
          { label:'Senate → Rep', pD: poly.senateR, kD: kalshi.senateR, d:false },
        ].map(({ label, pD, kD, d }, i) => `
          <tr style="border-bottom:1px solid var(--border);${i%2===0?'background:#f8fafc':''}">
            <td style="padding:8px 12px;font-weight:500;color:var(--text)">${label}</td>
            <td style="padding:8px 12px;text-align:center">${pD != null ? `<span style="font-weight:700;color:${d?'var(--dem)':'var(--rep)'}">${pD}%</span>` : '<span style="color:var(--faint)">—</span>'}</td>
            <td style="padding:8px 12px;text-align:center">${kD != null ? `<span style="font-weight:700;color:${d?'var(--dem)':'var(--rep)'}">${kD}%</span>` : '<span style="color:var(--faint)">—</span>'}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  wrap.appendChild(summaryCard);

  // Big 8
  const big8Card = div('card');

  const POLY_ODDS = { "Maine":55,"North Carolina":64,"Georgia":70,"Michigan":58,"Ohio (Special)":40,"Alaska":48,"Texas":22,"New Hampshire":65 };

  ["North Carolina","Maine","Ohio (Special)","Alaska","Michigan","Georgia","New Hampshire","Texas"].forEach(state => {
    const polyD = POLY_ODDS[state] || 50;
    const detail = RACE_DETAILS[state];
    const rating = getRating(state);
    const liveData = DATA?.senatePolls?.[state];
    const card = div('race-card');
    card.onclick = () => { currentTab = 'senate polling'; selectedRace = state; renderTabs(); renderMain(); };
    const primaryRating = rating.cook || rating.sabato || '—';
    const lastPollDate = liveData?.avg?.date || liveData?.rtwh?.date;
    const isStale = daysSince(lastPollDate) > 14;
    const bestAvg = liveData?.rtwh || liveData?.avg;
    const avgSource = liveData?.rtwh ? 'RTWH' : liveData?.avg ? 'RCP' : '';
    const avgMarginStr = bestAvg ? fmtMargin(bestAvg.margin) : (detail.matchups[0]?.margin || '—');
    const isLiveD = bestAvg ? isMarginD(bestAvg.margin) : detail.matchups[0]?.margin?.includes('D');

    card.innerHTML = `
      <div class="race-header">
        <span class="race-name">${state}</span>
        <span class="badge badge-${detail.hold.toLowerCase()}" title="Current seat holder">Current: ${detail.hold}</span>
        <span class="badge ${ratingBadgeClass(primaryRating)}" style="margin-left:auto">${primaryRating}</span>
      </div>
      <div class="race-row">
        <span class="race-row-label">Latest avg ${avgSource ? '<span style="font-size:10px;color:var(--faint)">('+avgSource+')</span>' : ''} ${lastPollDate && isStale ? '<span class="stale-badge">⚠ stale</span>' : ''}</span>
        <span class="${isLiveD ? 'pill pill-d' : 'pill pill-r'}">${avgMarginStr}</span>
      </div>
      <div class="race-row">
        <span class="race-row-label">Polymarket</span>
        <span class="${polyD >= 50 ? 'pill pill-d' : 'pill pill-r'}">${polyD >= 50 ? polyD+'% D' : (100-polyD)+'% R'}</span>
      </div>`;
    big8Grid.appendChild(card);
  });
  big8Card.appendChild(big8Grid);
  wrap.appendChild(big8Card);
  return wrap;

function renderSenatePolling() {
  const wrap = div('');
  const outer = div('card', '');
  outer.style.padding = '0'; outer.style.overflow = 'hidden';
  const tabsRow = div('race-tabs');
  RACE_ORDER.forEach(state => {
    tabsRow.appendChild(el('button', { class: 'race-tab' + (state === selectedRace ? ' active' : ''), onclick: () => { selectedRace = state; renderMain(); } }, state));
  });
  outer.appendChild(tabsRow);

  const detail = RACE_DETAILS[selectedRace];
  const rating = getRating(selectedRace);
  const content = div('race-content space-y');

  const raceHead = div('');
  raceHead.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
      <div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <h2 style="font-size:22px;font-weight:800">${selectedRace}</h2>
          <span class="badge badge-${detail.hold.toLowerCase()}" title="Current seat holder">Current: ${detail.hold}</span>
        </div>
        <p style="font-size:13px;color:var(--muted);max-width:600px;line-height:1.5">${detail.context}</p>
        <div style="display:flex;gap:16px;font-size:12px;color:var(--faint);margin-top:8px">
          <span>Primary: <span style="color:var(--muted)">${detail.primaryDate}</span></span>
          <span>2024: <span class="${detail.trump24.includes('Harris') ? 'dem-color' : 'rep-color'}">${detail.trump24}</span></span>
        </div>
      </div>
      <div style="display:flex;gap:12px">${['Cook','Sabato','IE'].map((label, i) => { const r = [rating.cook, rating.sabato, rating.ie][i] || '—'; return `<div style="text-align:center"><div style="font-size:11px;color:var(--faint);margin-bottom:4px">${label}</div><span class="badge ${ratingBadgeClass(r)}">${r}</span></div>`; }).join('')}</div>
    </div>`;
  content.appendChild(raceHead);

  const liveData = DATA?.senatePolls?.[selectedRace];
  const mSection = div('');
  mSection.innerHTML = '<div class="card-title">Poll Averages</div>';

  if (liveData?.avg || liveData?.rtwh) {
    if (liveData?.avg) {
      const avg = liveData.avg;
      const isDem = isMarginD(avg.margin);
      const isStale = daysSince(avg.date) > 14;
      const avgRow = div('poll-row avg-row');
      const weekAgo = HISTORY.slice().reverse().find(h => {
      const d = new Date(h.date);
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 5);
      return d <= cutoff && (h.senatePolls?.[selectedRace]?.avg || h.senatePolls?.[selectedRace]?.rtwh);
    });
    const weekAvg = weekAgo?.senatePolls?.[selectedRace]?.rtwh || weekAgo?.senatePolls?.[selectedRace]?.avg;
    const weekDelta = weekAvg ? (parseFloat(avg.margin) - parseFloat(weekAvg.margin)).toFixed(1) : null;
    const deltaStr = weekDelta ? (parseFloat(weekDelta) > 0 ? `▲ +${weekDelta} D` : parseFloat(weekDelta) < 0 ? `▼ ${Math.abs(parseFloat(weekDelta)).toFixed(1)} R` : '→ no change') : null;
    const deltaColor = weekDelta ? (parseFloat(weekDelta) > 0 ? 'var(--dem)' : parseFloat(weekDelta) < 0 ? 'var(--rep)' : 'var(--faint)') : '';
    avgRow.innerHTML = `<div class="poll-header"><div><div style="font-size:13px;color:var(--text);font-weight:600">RCP Average ${isStale ? '<span class="stale-badge">⚠ stale</span>' : ''}</div><div style="font-size:11px;color:var(--faint)">${avg.source || 'RCP'} · <span style="color:var(--green)">${avg.date}</span>${deltaStr ? ` · <span style="color:${deltaColor};font-weight:600">${deltaStr} vs last week</span>` : ''}</div></div><div class="poll-margin ${isDem ? 'dem-color' : 'rep-color'}">${fmtMargin(avg.margin)}</div></div>${pollBar(avg.dem, avg.rep)}`;
      mSection.appendChild(avgRow);
    }
    if (liveData?.rtwh) {
      const rtwh = liveData.rtwh;
      const isDem = isMarginD(rtwh.margin);
      const rtwhRow = div('poll-row rtwh-row');
      const rtwhWeekAvg = weekAgo?.senatePolls?.[selectedRace]?.rtwh;
    const rtwhDelta = rtwhWeekAvg ? (parseFloat(rtwh.margin) - parseFloat(rtwhWeekAvg.margin)).toFixed(1) : null;
    const rtwhDeltaStr = rtwhDelta ? (parseFloat(rtwhDelta) > 0 ? `▲ +${rtwhDelta} D` : parseFloat(rtwhDelta) < 0 ? `▼ ${Math.abs(parseFloat(rtwhDelta)).toFixed(1)} R` : '→ no change') : null;
    const rtwhDeltaColor = rtwhDelta ? (parseFloat(rtwhDelta) > 0 ? 'var(--dem)' : parseFloat(rtwhDelta) < 0 ? 'var(--rep)' : 'var(--faint)') : '';
    rtwhRow.innerHTML = `<div class="poll-header"><div><div style="font-size:13px;color:var(--text);font-weight:600">RaceToTheWH Average</div><div style="font-size:11px;color:var(--faint)">Weighted by recency & pollster quality · <span style="color:var(--green)">${rtwh.date}</span>${rtwhDeltaStr ? ` · <span style="color:${rtwhDeltaColor};font-weight:600">${rtwhDeltaStr} vs last week</span>` : ''}</div></div><div class="poll-margin ${isDem ? 'dem-color' : 'rep-color'}">${fmtMargin(rtwh.margin)}</div></div>${pollBar(rtwh.dem, rtwh.rep)}`;
      mSection.appendChild(rtwhRow);
    }
    (liveData?.polls || []).forEach(p => {
      const pIsDem = isMarginD(p.margin);
      const pRow = div('poll-row');
      pRow.innerHTML = `<div class="poll-header"><div><div style="font-size:13px;color:var(--text)">${p.source}</div><div style="font-size:11px;color:var(--faint)">${p.date}</div></div><div class="poll-margin ${pIsDem ? 'dem-color' : 'rep-color'}">${fmtMargin(p.margin)}</div></div>${pollBar(p.dem, p.rep)}`;
      mSection.appendChild(pRow);
    });
  } else if (detail.matchups.length > 0) {
    detail.matchups.forEach(m => {
      const isDem = m.margin.includes('D');
      const row = div('poll-row avg-row');
      row.innerHTML = `<div class="poll-header"><div><div style="font-size:13px;color:var(--text)"><span style="color:var(--dem)">${m.dem}</span> vs <span style="color:var(--rep)">${m.rep}</span></div><div style="font-size:11px;color:var(--faint)">${m.source} · ${m.date}</div></div><div class="poll-margin ${isDem ? 'dem-color' : 'rep-color'}">${m.margin}</div></div>${pollBar(m.demPct, m.repPct)}`;
      mSection.appendChild(row);
    });
  } else {
    mSection.innerHTML += '<div style="color:var(--muted);font-size:13px;padding:16px">No poll data yet</div>';
  }
  content.appendChild(mSection);

  if (detail.primary) {
    const pSection = div('');
    pSection.innerHTML = `<div class="card-title">${detail.primary.label || 'Primary'}</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px">${detail.primary.result}</span><span style="font-size:14px;font-weight:700;color:var(--dem)">${detail.primary.margin}</span></div>`;
    content.appendChild(pSection);
  }

  outer.appendChild(content);
  wrap.appendChild(outer);
  return wrap;
}

function renderTrends() {
  const wrap = div('space-y');
  if (HISTORY.length < 2) {
    const msg = div('card');
    msg.innerHTML = `<div class="card-title">Trends</div><div style="color:var(--muted);text-align:center;padding:32px">Trends appear once 2+ days of data are collected.<br><span style="color:var(--faint);font-size:12px">Currently tracking ${HISTORY.length} day(s).</span></div>`;
    wrap.appendChild(msg);
    return wrap;
  }
  const dates = HISTORY.map(d => d.date.slice(5));
  // Time window filter
  let activeWindow = '9m';
  const windows = [
    { key:'1m', label:'1 Month', days:30 },
    { key:'3m', label:'3 Months', days:90 },
    { key:'ytd', label:'YTD', days:null },
    { key:'9m', label:'All', days:999 },
  ];

  function filterByWindow(dataArr, labelArr, days) {
    if (!days || days >= 999) return { data: dataArr, labels: labelArr };
    const cutoff = new Date();
    if (days === null) { // YTD
      cutoff.setMonth(0); cutoff.setDate(1);
    } else {
      cutoff.setDate(cutoff.getDate() - days);
    }
    const cutoffStr = cutoff.toISOString().split('T')[0];
    const indices = labelArr.map((l,i) => i).filter(i => {
      const yr = new Date().getFullYear();
      const full = `${yr}-${labelArr[i]}`;
      return full >= cutoffStr || labelArr[i] <= cutoffStr.slice(5);
    });
    // simpler: just take last N items
    const n = days === null ? 
      labelArr.filter(l => {
        const yr = new Date().getFullYear();
        return `${yr}-${l}` >= cutoffStr;
      }).length :
      Math.min(days, labelArr.length);
    const start = Math.max(0, labelArr.length - n);
    return { data: dataArr.map(d => d.slice(start)), labels: labelArr.slice(start) };
  }

  function makeWindowSelector(onSelect) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:10px;';
    windows.forEach(w => {
      const btn = document.createElement('button');
      btn.textContent = w.label;
      btn.style.cssText = `padding:3px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:600;background:${w.key===activeWindow?'var(--dem)':'white'};color:${w.key===activeWindow?'white':'var(--muted)'};`;
      btn.onclick = () => { activeWindow = w.key; onSelect(); };
      row.appendChild(btn);
    });
    return row;
  }

  const chartRegistry = {};

  function makeChart(canvasId, label, datasets, customLabels) {
    const card = div('card');
    const selectorId = canvasId + '-sel';
    card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="card-title" style="margin-bottom:0">${label}</div><div id="${selectorId}" style="display:flex;gap:4px;"></div></div><div style="position:relative;height:200px"><canvas id="${canvasId}"></canvas></div>`;
    wrap.appendChild(card);

    function renderChart() {
      const allLabels = customLabels || dates;
      const w = windows.find(w => w.key === activeWindow);
      const n = w.days === null ? allLabels.filter(l => {
        const cutoff = new Date(); cutoff.setMonth(0); cutoff.setDate(1);
        const yr = new Date().getFullYear();
        return new Date(`${yr}-${l}`) >= cutoff;
      }).length : Math.min(w.days || 9999, allLabels.length);
      const start = Math.max(0, allLabels.length - n);
      const slicedLabels = allLabels.slice(start);
      const slicedDatasets = datasets.map(ds => ({ ...ds, data: ds.data.slice(start) }));

      const existing = chartRegistry[canvasId];
      if (existing) { existing.destroy(); delete chartRegistry[canvasId]; }
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      chartRegistry[canvasId] = new Chart(ctx, { type:'line', data:{ labels: slicedLabels, datasets: slicedDatasets }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ color:'#64748b', font:{ size:11 }, boxWidth:20, padding:12 } } }, scales:{ x:{ ticks:{ color:'#94a3b8', font:{ size:10 }, maxTicksLimit:8 }, grid:{ color:'#e2e8f0' } }, y:{ ticks:{ color:'#94a3b8', font:{ size:10 }, callback: v => v+'%' }, grid:{ color:'#e2e8f0' } } } } });

      // Render window selector buttons
      const selEl = document.getElementById(selectorId);
      if (selEl) {
        selEl.innerHTML = '';
        windows.forEach(w => {
          const btn = document.createElement('button');
          btn.textContent = w.label;
          btn.style.cssText = `padding:2px 8px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;background:${w.key===activeWindow?'var(--dem)':'white'};color:${w.key===activeWindow?'white':'var(--muted)'};`;
          btn.onclick = () => { activeWindow = w.key; Object.keys(chartRegistry).forEach(id => { const fn = renderFns[id]; if(fn) fn(); }); };
          selEl.appendChild(btn);
        });
      }
    }
    if (!window.renderFns) window.renderFns = {};
    window.renderFns = window.renderFns || {};
    setTimeout(() => {
      renderChart();
      if (!window.renderFns) window.renderFns = {};
      window.renderFns[canvasId] = renderChart;
    }, 50);
  }
  makeChart('chart-ballot', 'Generic Ballot Margin (D − R)', [{ label:'D margin', data:HISTORY.map(d => { const a=d.genericBallot?.avg; return a?parseFloat(parseFloat(a.margin).toFixed(1)):null; }), borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.1)', tension:0.3, pointRadius:2, fill:true }]);
  makeChart('chart-approval-ns', 'Trump Net Approval (Nate Silver)',
    [{ label:'Net approval', data:NATE_APPROVAL.map(r => r[3]), borderColor:'#dc2626', tension:0.3, pointRadius:1, fill:false }],
    NATE_APPROVAL.map(r => r[0].slice(5))
  );
  ['North Carolina','Maine','Ohio (Special)','Alaska','Michigan','Georgia','New Hampshire'].forEach(state => {
    const stateData = HISTORY.map(d => ({ date: d.date.slice(5), avg: d.senatePolls?.[state]?.rtwh || d.senatePolls?.[state]?.avg })).filter(d => d.avg);
    if (stateData.length < 2) return;
    makeChart('chart-senate-' + state.replace(/[^a-z]/gi, ''), `${state} — Poll Average`, [{ label:'Dem %', data:stateData.map(d => d.avg.dem), borderColor:'#2563eb', tension:0.3, pointRadius:2, fill:false }, { label:'Rep %', data:stateData.map(d => d.avg.rep), borderColor:'#dc2626', tension:0.3, pointRadius:2, fill:false }], stateData.map(d => d.date));
  });
  wrap.appendChild(div('', `<p style="font-size:11px;color:var(--faint);text-align:center">Tracking ${HISTORY.length} days · Data from Polymarket, Kalshi, RCP, RTWH</p>`));
  return wrap;
}

function renderTrumpApproval(appr) {
  const wrap = div('space-y');

  // Current numbers card
  const nsLatest = NATE_APPROVAL.length > 0 ? NATE_APPROVAL[NATE_APPROVAL.length - 1] : null;
  const approve = nsLatest ? nsLatest[1] : (appr?.approve ?? 40.5);
  const disapprove = nsLatest ? nsLatest[2] : (appr?.disapprove ?? 55.4);
  const net = nsLatest ? nsLatest[3] : (appr?.net ?? -14.9);
  const netStr = typeof net === 'number' ? net.toFixed(1) : net;
  const sourceLabel = nsLatest ? `Nate Silver Avg · Updated ${nsLatest[0]}` : (appr?.source || 'RCP Average');

  const card = div('card');
  card.innerHTML = `
    <div class="card-title">Trump Job Approval — ${sourceLabel}</div>
    <div style="display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Net Approval</div>
        <div style="font-size:44px;font-weight:800;color:var(--rep);letter-spacing:-2px">${netStr}</div>
      </div>
      <div style="flex:1;min-width:200px">
        <div class="appr-bar"><span style="font-size:12px;width:80px;color:var(--dem)">Approve</span><div style="flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden"><div class="appr-fill" style="width:${approve}%;background:var(--dem)">${approve}%</div></div></div>
        <div class="appr-bar"><span style="font-size:12px;width:80px;color:var(--rep)">Disapprove</span><div style="flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden"><div class="appr-fill" style="width:${disapprove}%;background:var(--rep)">${disapprove}%</div></div></div>
      </div>
    </div>`;
  wrap.appendChild(card);

  // Chart helper for Trump approval tab with window toggle
  function makeTrumpChart(canvasId, titleText, datasets) {
    const card = div('card');
    card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="card-title" style="margin-bottom:0">${titleText}</div><div id="${canvasId}-sel" style="display:flex;gap:4px;"></div></div><div style="position:relative;height:200px"><canvas id="${canvasId}"></canvas></div>`;
    wrap.appendChild(card);
    const wins = [{key:'1m',label:'1M',days:30},{key:'3m',label:'3M',days:90},{key:'ytd',label:'YTD',days:null},{key:'all',label:'All',days:9999}];
    let curWin = 'all';
    let chartInst = null;
    function render() {
      const w = wins.find(w => w.key === curWin);
      let start = 0;
      if (w.days === null) {
        const cutoff = new Date(); cutoff.setMonth(0); cutoff.setDate(1);
        start = NATE_APPROVAL.findIndex(r => new Date(r[0]) >= cutoff);
        if (start < 0) start = 0;
      } else {
        start = Math.max(0, NATE_APPROVAL.length - (w.days || 9999));
      }
      const slice = NATE_APPROVAL.slice(start);
      const labels = slice.map(r => r[0].slice(5));
      const slicedDatasets = datasets.map(ds => ({ ...ds, data: ds.getData(slice) }));
      if (chartInst) { chartInst.destroy(); chartInst = null; }
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      chartInst = new Chart(ctx, { type:'line', data:{ labels, datasets: slicedDatasets }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ color:'#64748b', font:{ size:11 }, boxWidth:20, padding:10 } } }, scales:{ x:{ ticks:{ color:'#94a3b8', font:{ size:10 }, maxTicksLimit:10 }, grid:{ color:'#e2e8f0' } }, y:{ ticks:{ color:'#94a3b8', font:{ size:10 }, callback: v => v+'%' }, grid:{ color:'#e2e8f0' } } } } });
      const sel = document.getElementById(canvasId + '-sel');
      if (sel) {
        sel.innerHTML = '';
        wins.forEach(w2 => {
          const btn = document.createElement('button');
          btn.textContent = w2.label;
          btn.style.cssText = `padding:2px 8px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;background:${w2.key===curWin?'var(--dem)':'white'};color:${w2.key===curWin?'white':'var(--muted)'};`;
          btn.onclick = () => { curWin = w2.key; render(); };
          sel.appendChild(btn);
        });
      }
    }
    setTimeout(render, 50);
  }

  // Chart 1: Approve vs Disapprove
  makeTrumpChart('ns-appr-chart', 'Approve / Disapprove (Nate Silver)', [
    { label:'Approve', borderColor:'#2563eb', tension:0.3, pointRadius:1, fill:false, getData: s => s.map(r => r[1]) },
    { label:'Disapprove', borderColor:'#dc2626', tension:0.3, pointRadius:1, fill:false, getData: s => s.map(r => r[2]) },
  ]);

  // Chart 2: Net approval
  makeTrumpChart('ns-net-chart', 'Net Approval (Nate Silver)', [
    { label:'Net', borderColor:'#94a3b8', tension:0.3, pointRadius:1, fill:false, borderDash:[4,2], getData: s => s.map(r => r[3]) },
  ]);

  return wrap;
}

async function loadData() {
  try {
    const [dataRes, histRes] = await Promise.allSettled([fetch('data/data.json?v=' + Date.now()), fetch('data/history.json?v=' + Date.now())]);
    if (dataRes.status === 'fulfilled' && dataRes.value.ok) { DATA = await dataRes.value.json(); document.getElementById('last-updated').textContent = DATA.lastUpdated || 'Unknown'; }
    if (histRes.status === 'fulfilled' && histRes.value.ok) { HISTORY = await histRes.value.json(); }
  } catch (e) { DATA = { markets: { polymarket: {}, kalshi: {} }, genericBallot: { polls: [], avg: null }, senateRatings: {}, trumpApproval: {} }; }
  renderTabs();
  renderMain();
}

renderTabs();
loadData();
